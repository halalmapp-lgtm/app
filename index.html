<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Find halal restaurants near you. Discover, review, and save halal spots, plus exclusive deals.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="HalalMapp">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>HalalMapp - Find Halal Restaurants</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Google Maps JavaScript API for web. Web map keys are necessarily public, so
    this MUST be restricted by HTTP referrer in Google Cloud. The AIzaSyBSGowMo5WllzewFQ6BGSB3xazQPXE0oks
    token is replaced at build/deploy time (see CI / deploy runbook). For local
    dev, substitute your key via ./scripts/sync_secrets.sh (from secrets.local.env).
  -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCW1Ealt8M95qAwMxv3AY1Ib3qiH6WsLb4"></script>
  <script>
    // Flutter web does not expose clickableIcons; disable default POI info windows.
    // Also default map chrome off so controls do not flash before the plugin applies options.
    (function () {
      var OriginalMap = google.maps.Map;
      google.maps.Map = function (element, opts) {
        opts = opts || {};
        opts.clickableIcons = false;
        if (opts.zoomControl === undefined) opts.zoomControl = false;
        if (opts.mapTypeControl === undefined) opts.mapTypeControl = false;
        if (opts.streetViewControl === undefined) opts.streetViewControl = false;
        if (opts.fullscreenControl === undefined) opts.fullscreenControl = false;
        if (opts.scaleControl === undefined) opts.scaleControl = false;
        if (opts.rotateControl === undefined) opts.rotateControl = false;
        return new OriginalMap(element, opts);
      };
      google.maps.Map.prototype = OriginalMap.prototype;
      var setOptions = OriginalMap.prototype.setOptions;
      if (setOptions) {
        OriginalMap.prototype.setOptions = function (opts) {
          if (opts) opts.clickableIcons = false;
          return setOptions.call(this, opts);
        };
      }
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
